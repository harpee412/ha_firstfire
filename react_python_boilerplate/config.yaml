name: FirstFire
version: "0.1.12"
slug: firstfire
description: FirstFire - AI-Powered Home Assistant Onboarding with OpenAI
startup: services
boot: auto

arch:
  - amd64
  - aarch64
  - armv7

ingress: true
ingress_port: 8099

homeassistant_api: true

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: Web UI

init: false

options:
  openai_token: ""
  max_tokens: 500
  model: gpt-4-turbo

schema:
  openai_token: str
  max_tokens: int
  model: str