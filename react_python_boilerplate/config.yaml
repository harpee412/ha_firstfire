name: FirstFire
version: "0.1.3"
slug: firstfire
description: FirstFire - AI-Powered Home Assistant Onboarding with OpenAI
startup: services
boot: auto

arch:
  - amd64
  - aarch64
  - armv7

ingress: true
ingress_port: 8099

homeassistant_api: true

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: Web UI

init: false

options:
  openai_token: ""
  max_tokens: 500
  model: gpt-4-turbo

schema:
  openai_token:
    name: OpenAI API Token
    description: Your OpenAI API key (get one at https://platform.openai.com/api-keys)
    type: string
    default: ""

  max_tokens:
    name: Max Tokens per Response
    description: Maximum tokens for AI responses
    type: integer
    default: 500

  model:
    name: OpenAI Model
    description: Which OpenAI model to use
    type: string
    default: gpt-4-turbo